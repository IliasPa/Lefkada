name: Veto 7-day expiry cleanup

# A veto stays ACTIVE for 7 days from the day it was cast — there is no weekly
# Monday reset. This job runs daily and DELETES rows older than 7 days so the
# table stays small and a citizen can veto again once theirs lapses. The counts
# in the app and /admin already filter by date, so timing here is not critical.
# Per-day totals are printed to the run log before deleting.

on:
  schedule:
    - cron: '20 2 * * *' # ~04:20/05:20 Athens; any daily run is fine
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write # the failure alarm

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete vetos older than 7 days
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL secret is missing" >&2
            exit 1
          fi
          echo "Per-day veto totals (current 7-day window):"
          psql "$SUPABASE_DB_URL" -c "select veto_date, count(*) as vetos from public.vetos group by veto_date order by veto_date;"
          psql "$SUPABASE_DB_URL" -c "delete from public.vetos where veto_date < (public.athens_today() - 6);"
          echo "Expired vetos (older than 7 days) cleared."

      - name: Open a can't-miss issue (GitHub emails it) on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY=$'# 🔴 Ο καθαρισμός των ληγμένων βέτο απέτυχε\n\n## Ο πίνακας `vetos` ενδέχεται να κρατά ληγμένες εγγραφές (πάνω από 7 ημέρες).\n\n**Τι να κάνετε:** δείτε το [αποτυχημένο run]('"$RUN_URL"$') — συνηθέστερη αιτία: το secret `SUPABASE_DB_URL` λείπει ή άλλαξε ο κωδικός της βάσης. Μετά τη διόρθωση τρέξτε το workflow χειροκίνητα ή διαγράψτε τις παλιές γραμμές του πίνακα `vetos` από το SQL Editor.\n\n*Αυτόματο issue από το workflow «Veto 7-day expiry cleanup».*'
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "🔴 VETO CLEANUP FAILED — $(date -u +%Y-%m-%d)" \
            --body "$BODY"
